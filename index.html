<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Service Update - NoppoStudio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Luminous Clarity Palette */
            --primary: #0040e0;
            --surface: #f8f9ff;
            --surface-container: #e5eeff;
            --on-surface: #0b1c30;
            --outline: #747688;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            background-color: var(--surface);
            color: var(--on-surface);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            padding: 1.5rem;
        }

        /* 背景の有機的なグラデーション */
        .bg-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: move 15s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(30px, 60px) scale(1.1); }
        }

        .content-wrapper {
            text-align: center;
            width: 100%;
            max-width: 640px;
            z-index: 10;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            font-size: clamp(5rem, 15vw, 8rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary), #6700ed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
            opacity: 0.8;
        }

        .status-tag {
            background: rgba(0, 64, 224, 0.08);
            color: var(--primary);
            padding: 0.5rem 1.25rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 64, 224, 0.15);
        }

        h1 {
            font-size: clamp(1.75rem, 6vw, 3rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            letter-spacing: -0.03em;
            word-break: keep-all;
        }

        p {
            color: var(--outline);
            font-size: clamp(0.95rem, 3vw, 1.1rem);
            line-height: 1.8;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .progress-indicator {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 1rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--surface-container);
            animation: dotLoading 1.5s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotLoading {
            0%, 80%, 100% { transform: scale(1); background: var(--surface-container); }
            40% { transform: scale(1.4); background: var(--primary); }
        }

        .footer {
            position: absolute;
            bottom: 2.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--outline);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            opacity: 0.6;
        }

        @media (max-width: 640px) {
            .blob {
                filter: blur(40px);
                width: 250px !important;
                height: 250px !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient">
        <div class="blob" style="width: 500px; height: 500px; top: -15%; left: -10%; background: #d3e4fe;"></div>
        <div class="blob" style="width: 400px; height: 400px; bottom: -10%; right: -5%; background: #e5eeff; animation-delay: -5s;"></div>
    </div>

    <main class="content-wrapper">
        <div class="status-tag">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
            </span>
            SYSTEM UPDATE IN PROGRESS
        </div>

        <div class="error-code">404</div>
        
        <h1>NoppoAIHub停止のお知らせ</h1>
        
        <p>
            NoppoStudioは現在、セキュリティの再設計を行っています。<br>
            大切なデータを守り、よりパーソナルで安全な体験を届けるために。<br class="hidden sm:block">
            完成まで、もうしばらくお待ちください。
        </p>

        <div class="progress-indicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </main>

    <div class="footer">
        NOPPO STUDIO • LUMINOUS CLARITY
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
